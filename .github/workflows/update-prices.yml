name: Daily Pricing Update

on:
  schedule:
    # Run every day at 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Allows manual trigger of the workflow

jobs:
  update-prices:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-genai

    - name: Run price update script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        chmod +x update_prices.py
        python update_prices.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Check if data.json was updated
        if ! git diff --exit-code data.json; then
          git add data.json
          git commit -m "Auto-update video platform prices (daily cron)"
          git push origin master
        else
          echo "No price changes detected today."
        fi
